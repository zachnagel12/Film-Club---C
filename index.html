<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0ece4;--bg2:#faf9f7;--bg3:#f4f2ee;--panel:#faf9f7;
  --border:#ddd6cc;--border2:#c8beb4;
  --accent:#b06030;--accent2:#c87040;--gold:#9a7830;
  --text:#1a1610;--text2:#50453a;--text3:#8a7e72;
  --green:#1a6a2a;--red:#8a2020;
}
body{background:var(--bg3);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;font-size:14px;}

nav{background:var(--bg2);border-bottom:2px solid var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:46px;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Russo One',sans-serif;font-size:19px;letter-spacing:0.02em;color:var(--text);cursor:pointer;}
.nav-logo span{color:var(--accent);}
.nav-tabs{display:flex;gap:0;}
.nav-tab{padding:0 16px;height:46px;display:flex;align-items:center;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.nav-tab:hover{color:var(--text2);}
.nav-tab.active{color:var(--text);border-bottom:2px solid var(--accent);}
.nav-search{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:13px;padding:5px 10px;outline:none;width:200px;}
.nav-search:focus{border-color:var(--accent2);}
.nav-search::placeholder{color:var(--text3);}

.ticker{background:var(--accent);padding:0;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--bg2);display:flex;align-items:center;white-space:nowrap;overflow:hidden;position:relative;}
.ticker-tag{background:var(--bg2);color:var(--accent);padding:4px 9px;font-size:9px;letter-spacing:0.2em;flex-shrink:0;font-weight:600;align-self:stretch;display:flex;align-items:center;}
.ticker-track{display:flex;gap:24px;padding:4px 18px;animation:tickerScroll 80s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
.ticker-item{flex-shrink:0;}
.ticker-item .tk-score{color:var(--bg2);font-weight:700;margin-left:4px;}
.tk-sep{opacity:0.5;margin:0 4px;}
@keyframes tickerScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

.page{display:none;}
.page.active{display:block;}

/* HERO with Now Showing */
.hero{padding:22px 20px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1.1fr;gap:28px;align-items:start;}
.hero-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:7px;}
.hero-title{font-family:'Russo One',sans-serif;font-size:32px;line-height:1.0;color:var(--text);margin-bottom:8px;}
.hero-title em{color:var(--accent);font-style:normal;}
.hero-desc{font-size:13px;color:var(--text2);line-height:1.5;max-width:420px;font-weight:300;margin-bottom:14px;}
.hero-cta{display:flex;gap:6px;}
.hero-cta-btn{padding:7px 13px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;border:none;transition:opacity 0.12s;}
.hero-cta-btn:hover{opacity:0.85;}
.hero-cta-primary{background:var(--accent);color:var(--bg2);}
.hero-cta-secondary{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);}

.now-showing{background:var(--panel);border:1px solid var(--border);}
.ns-head{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border);background:var(--bg3);}
.ns-head-title{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text);font-weight:600;}
.ns-head-meta{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);}
.ns-row{display:grid;grid-template-columns:22px 1fr auto auto;gap:10px;align-items:center;padding:6px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.08s;}
.ns-row:hover{background:var(--bg3);}
.ns-row:last-child{border-bottom:none;}
.ns-rank{font-family:'Russo One',sans-serif;font-size:13px;color:var(--text3);}
.ns-rank.top{color:var(--accent);}
.ns-title{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
.ns-meta{font-size:10px;color:var(--text3);font-family:'Oswald',sans-serif;letter-spacing:0.06em;}
.ns-score{font-family:'Russo One',sans-serif;font-size:13px;color:var(--accent);}
.ns-trend{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;width:14px;text-align:center;}
.ns-trend.up{color:var(--green);}
.ns-trend.flat{color:var(--text3);}

.genre-bar{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.genre-btn{padding:8px 16px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;}
.genre-btn:hover{color:var(--text2);}
.genre-btn.active{color:var(--text);border-bottom:2px solid var(--accent);}

.section-wrap{padding:18px 20px 0;}
.section-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);}
.section-title strong{color:var(--text);font-weight:600;}
.section-sub{font-size:11px;color:var(--text3);font-weight:300;margin-top:-6px;margin-bottom:12px;font-style:italic;}

.film-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:24px;}
.film-card{cursor:pointer;transition:opacity 0.12s;}
.film-card:hover{opacity:0.82;}
.film-poster{width:100%;aspect-ratio:2/3;background:var(--panel);border:1px solid var(--border);position:relative;overflow:hidden;}
.film-poster img{width:100%;height:100%;object-fit:cover;display:block;}
.film-poster-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;}
.film-score-badge{position:absolute;bottom:5px;right:5px;background:rgba(250,249,247,0.92);font-family:'Russo One',sans-serif;font-size:11px;color:var(--accent);padding:2px 5px;border:1px solid var(--border2);}
.film-info{padding:5px 0 0;}
.film-title{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.film-meta{font-size:10px;color:var(--text3);margin-top:1px;}

/* RANKINGS */
.rankings-panel{max-width:920px;margin:0 auto;}
.rank-controls{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.rank-btn{flex:1;padding:9px 0;text-align:center;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;min-width:90px;}
.rank-btn.active{color:var(--text);border-bottom:2px solid var(--accent);}
.rank-btn:hover:not(.active){color:var(--text2);}
.rank-table{width:100%;border-collapse:collapse;}
.rank-table thead th{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);padding:7px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg2);font-weight:400;}
.rank-table tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.08s;}
.rank-table tbody tr:hover{background:var(--panel);}
.rank-table td{padding:8px 16px;vertical-align:middle;}
.r-num{font-family:'Oswald',sans-serif;font-size:11px;color:var(--text3);width:30px;}
.r-poster{width:36px;height:54px;object-fit:cover;border:1px solid var(--border);background:var(--panel);}
.r-poster-ph{width:36px;height:54px;background:var(--panel);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;}
.r-name{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--text);}
.r-meta{font-size:10px;color:var(--text3);margin-top:1px;}
.r-score{font-family:'Russo One',sans-serif;font-size:14px;color:var(--accent);text-align:right;}

/* DEBATE */
.debate-head{padding:22px 20px 14px;border-bottom:1px solid var(--border);}
.debate-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.debate-title{font-family:'Russo One',sans-serif;font-size:26px;line-height:1.0;color:var(--text);margin-bottom:6px;}
.debate-sub{font-size:13px;color:var(--text2);font-weight:300;max-width:560px;line-height:1.5;}
.debate-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.debate-tab{flex:1;padding:9px 0;text-align:center;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all 0.15s;min-width:120px;}
.debate-tab.active{color:var(--text);border-bottom:2px solid var(--accent);}
.debate-tab:hover:not(.active){color:var(--text2);}

.takes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;padding:18px 20px;}
.take-card{background:var(--panel);border:1px solid var(--border);padding:14px;cursor:pointer;transition:all 0.12s;border-left:3px solid var(--accent);}
.take-card:hover{border-left-color:var(--accent2);transform:translateY(-1px);box-shadow:0 2px 8px rgba(26,22,16,0.06);}
.take-label{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;font-weight:600;}
.take-headline{font-family:'Russo One',sans-serif;font-size:16px;color:var(--text);line-height:1.15;margin-bottom:6px;}
.take-film{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.take-stat{display:flex;align-items:baseline;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.take-stat-val{font-family:'Russo One',sans-serif;font-size:18px;color:var(--accent);}
.take-stat-lbl{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);}

/* COMPARE */
.compare-wrap{padding:20px;max-width:920px;margin:0 auto;}
.compare-head{text-align:center;margin-bottom:18px;}
.compare-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:14px;align-items:stretch;}
.compare-slot{background:var(--panel);border:1px solid var(--border);padding:14px;min-height:280px;display:flex;flex-direction:column;}
.compare-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--text3);font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;text-align:center;padding:30px;}
.compare-empty-btn{padding:8px 14px;background:var(--accent);color:var(--bg2);border:none;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;}
.compare-vs{display:flex;align-items:center;justify-content:center;font-family:'Russo One',sans-serif;font-size:24px;color:var(--accent);}
.compare-poster{width:100%;aspect-ratio:2/3;object-fit:cover;border:1px solid var(--border);margin-bottom:10px;}
.compare-poster-ph{width:100%;aspect-ratio:2/3;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:36px;}
.compare-film-title{font-family:'Russo One',sans-serif;font-size:15px;color:var(--text);line-height:1.1;margin-bottom:3px;}
.compare-film-meta{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.compare-stats{display:flex;flex-direction:column;gap:6px;margin-top:auto;}
.compare-stat{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:var(--bg3);border:1px solid var(--border);}
.compare-stat-lbl{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);}
.compare-stat-val{font-family:'Russo One',sans-serif;font-size:13px;color:var(--text);}
.compare-stat.winner .compare-stat-val{color:var(--accent);}
.compare-stat.winner{background:rgba(176,96,48,0.08);border-color:var(--accent);}
.compare-clear{margin-top:8px;padding:5px;background:transparent;border:1px solid var(--border);color:var(--text3);font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;}
.compare-clear:hover{color:var(--text2);border-color:var(--border2);}

/* TASTE */
.taste-wrap{padding:22px 20px;}
.taste-empty{padding:50px 20px;text-align:center;}
.taste-empty-icon{font-size:42px;margin-bottom:10px;}
.taste-empty-title{font-family:'Russo One',sans-serif;font-size:18px;color:var(--text);margin-bottom:6px;}
.taste-empty-desc{font-size:13px;color:var(--text2);font-weight:300;max-width:340px;margin:0 auto;line-height:1.5;}
.taste-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:18px;}
.taste-card{background:var(--panel);border:1px solid var(--border);padding:14px;}
.taste-card-head{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.taste-big{font-family:'Russo One',sans-serif;font-size:26px;color:var(--accent);line-height:1;}
.taste-big-sub{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);margin-top:4px;}
.taste-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px;}
.taste-bar-name{flex:0 0 80px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.06em;color:var(--text2);text-transform:uppercase;}
.taste-bar-bar{flex:1;height:8px;background:var(--bg3);border:1px solid var(--border);position:relative;}
.taste-bar-fill{height:100%;background:var(--accent);}
.taste-bar-val{flex:0 0 28px;text-align:right;font-family:'Oswald',sans-serif;font-size:10px;color:var(--text3);font-weight:600;}

/* PERSON */
.person-hero{padding:20px;border-bottom:1px solid var(--border);display:flex;gap:18px;align-items:flex-start;}
.person-photo{width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);flex-shrink:0;}
.person-photo-ph{width:100px;height:100px;border-radius:50%;background:var(--panel);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;}
.person-name{font-family:'Russo One',sans-serif;font-size:24px;color:var(--text);margin-bottom:3px;line-height:1;}
.person-known{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
.person-bio{font-size:12px;color:var(--text2);line-height:1.55;font-weight:300;max-width:560px;margin-bottom:10px;}
.person-stats{display:flex;gap:8px;flex-wrap:wrap;}
.pstat{background:var(--panel);border:1px solid var(--border);padding:6px 12px;text-align:center;min-width:74px;}
.pstat-val{font-family:'Russo One',sans-serif;font-size:16px;color:var(--accent);line-height:1;}
.pstat-label{font-family:'Oswald',sans-serif;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-top:3px;}

.career-arc{padding:18px 20px 0;}
.career-arc-title{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.career-arc-svg{width:100%;height:120px;background:var(--panel);border:1px solid var(--border);display:block;}

/* WATCHLIST */
.watchlist-empty{padding:60px 20px;text-align:center;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}
.wl-head{display:flex;gap:10px;align-items:center;}
.wl-count{background:var(--accent);color:var(--bg2);font-family:'Russo One',sans-serif;font-size:11px;padding:1px 7px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:32px 16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);max-width:720px;width:100%;position:relative;}
.modal-close{position:absolute;top:10px;right:12px;font-size:18px;color:var(--bg2);cursor:pointer;z-index:10;line-height:1;background:rgba(0,0,0,0.5);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.modal-close:hover{background:rgba(0,0,0,0.7);}
.modal-backdrop{width:100%;height:200px;object-fit:cover;display:block;}
.modal-backdrop-ph{width:100%;height:200px;background:linear-gradient(135deg,var(--bg3),var(--border));display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text3);}
.modal-body{padding:16px;}
.modal-top{display:flex;gap:14px;margin-bottom:14px;}
.modal-poster{width:90px;height:135px;flex-shrink:0;object-fit:cover;border:1px solid var(--border);}
.modal-poster-ph{width:90px;height:135px;flex-shrink:0;background:var(--panel);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;}
.modal-title{font-family:'Russo One',sans-serif;font-size:22px;color:var(--text);line-height:1.1;margin-bottom:4px;}
.modal-meta{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.modal-scores{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.mscore{background:var(--bg3);border:1px solid var(--border);padding:5px 10px;text-align:center;min-width:54px;}
.mscore-val{font-family:'Russo One',sans-serif;font-size:16px;color:var(--accent);line-height:1;}
.mscore-label{font-family:'Oswald',sans-serif;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-top:2px;}
.modal-overview{font-size:12px;color:var(--text2);line-height:1.55;font-weight:300;margin-bottom:12px;}
.modal-section-label{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.modal-cast{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.cast-pill{background:var(--bg3);border:1px solid var(--border);padding:3px 8px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.06em;color:var(--text2);cursor:pointer;transition:all 0.12s;}
.cast-pill:hover{border-color:var(--accent);color:var(--accent);}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.mact-btn{padding:9px;border:none;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:opacity 0.12s;}
.mact-btn:hover{opacity:0.85;}
.btn-seen{background:var(--green);color:#fff;}
.btn-seen.inactive{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}
.btn-wl{background:var(--accent);color:var(--bg2);}
.btn-wl.inactive{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}
.btn-compare{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:100%;margin-bottom:14px;}
.btn-compare:hover{border-color:var(--accent);color:var(--accent);}
.star-row{display:flex;gap:3px;margin:8px 0 4px;}
.star{font-size:22px;cursor:pointer;color:var(--text3);transition:color 0.1s;line-height:1;}
.star.lit{color:var(--gold);}
.star:hover,.star:hover~.star{color:var(--text3);}
.star-row:hover .star{color:var(--gold);}
.star-row .star:hover~.star{color:var(--text3);}
.modal-similar{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}
.sim-card{cursor:pointer;}
.sim-card:hover{opacity:0.8;}
.sim-poster{width:100%;aspect-ratio:2/3;object-fit:cover;border:1px solid var(--border);}
.sim-poster-ph{width:100%;aspect-ratio:2/3;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;}
.sim-title{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;color:var(--text);line-height:1.2;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.loading-box{padding:40px;text-align:center;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);}
.no-results{padding:30px;text-align:center;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}

.search-section{padding:20px;}
.search-title{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg2);padding:10px 18px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;z-index:300;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

footer{background:var(--bg2);border-top:2px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.footer-logo{font-family:'Russo One',sans-serif;font-size:13px;color:var(--text2);}
.footer-logo span{color:var(--accent);}
.footer-meta{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);}

/* ===== LOGIN / AUTH ===== */
.auth-screen{position:fixed;inset:0;background:var(--bg3);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.auth-screen.hidden{display:none;}
.auth-bg{position:absolute;inset:0;background:
  radial-gradient(circle at 20% 30%,rgba(176,96,48,0.08),transparent 40%),
  radial-gradient(circle at 80% 70%,rgba(154,120,48,0.06),transparent 45%),
  repeating-linear-gradient(45deg,transparent,transparent 35px,rgba(176,96,48,0.025) 35px,rgba(176,96,48,0.025) 36px);
  pointer-events:none;}
.auth-card{background:var(--bg2);border:1px solid var(--border2);max-width:380px;width:100%;padding:36px 30px;position:relative;z-index:1;box-shadow:0 8px 30px rgba(26,22,16,0.08);}
.auth-logo{font-family:'Russo One',sans-serif;font-size:28px;letter-spacing:0.02em;color:var(--text);text-align:center;margin-bottom:4px;}
.auth-logo span{color:var(--accent);}
.auth-tagline{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);text-align:center;margin-bottom:28px;}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.auth-tab{flex:1;padding:9px 0;text-align:center;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;}
.auth-tab.active{color:var(--text);border-bottom:2px solid var(--accent);}
.auth-tab:hover:not(.active){color:var(--text2);}
.auth-field{margin-bottom:14px;}
.auth-label{display:block;font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;padding:9px 11px;outline:none;transition:border-color 0.12s;}
.auth-input:focus{border-color:var(--accent);}
.auth-submit{width:100%;padding:12px;background:var(--accent);color:var(--bg2);border:none;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:opacity 0.12s;margin-top:6px;}
.auth-submit:hover{opacity:0.88;}
.auth-error{color:var(--red);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-top:8px;text-align:center;min-height:14px;}
.auth-footer{margin-top:18px;text-align:center;font-size:11px;color:var(--text3);font-style:italic;font-weight:300;}
.auth-link-btn{background:none;border:none;color:var(--accent);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;padding:4px 8px;}
.auth-link-btn:hover{color:var(--accent2);text-decoration:underline;}
.auth-info{background:rgba(26,106,42,0.08);border-left:3px solid var(--green);padding:9px 11px;margin-top:10px;font-size:12px;color:var(--text2);line-height:1.5;font-weight:300;}
.auth-info strong{color:var(--green);font-weight:600;}
.auth-offline-banner{background:rgba(176,96,48,0.1);border-left:3px solid var(--accent);padding:8px 10px;margin-bottom:18px;font-size:11px;color:var(--text2);line-height:1.4;font-weight:300;}
.auth-offline-banner strong{color:var(--accent);font-weight:600;}
.sync-indicator{position:fixed;bottom:20px;right:20px;background:var(--text);color:var(--bg2);padding:7px 13px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;z-index:280;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;transform:translateY(10px);}
.sync-indicator.show{opacity:0.9;transform:translateY(0);}
.sync-indicator.error{background:var(--red);}
.sync-indicator-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;vertical-align:middle;}
.auth-existing{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.auth-existing-label{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;text-align:center;}
.auth-existing-list{display:flex;flex-direction:column;gap:5px;}
.auth-existing-btn{padding:7px 10px;background:var(--bg3);border:1px solid var(--border);font-family:'Oswald',sans-serif;font-size:11px;color:var(--text2);cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:all 0.12s;}
.auth-existing-btn:hover{border-color:var(--accent);color:var(--accent);}
.auth-existing-name{font-weight:600;letter-spacing:0.04em;}
.auth-existing-meta{font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;}

/* ===== LOADING SCREEN with film reel ===== */
.loader-screen{position:fixed;inset:0;background:var(--text);z-index:600;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:36px;}
.loader-screen.hidden{display:none;}
.loader-bg{position:absolute;inset:0;background:
  radial-gradient(circle at 50% 50%,rgba(176,96,48,0.18),transparent 60%),
  repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.015) 3px,rgba(255,255,255,0.015) 4px);
  pointer-events:none;}
.reel-stage{position:relative;width:220px;height:220px;}
.reel{width:100%;height:100%;animation:reelSpin 2.4s linear infinite;transform-origin:center;}
@keyframes reelSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.reel-filmstrip{position:absolute;top:50%;left:-160px;right:-160px;height:42px;transform:translateY(-50%);overflow:hidden;background:#0d0a07;border-top:1px solid rgba(176,96,48,0.4);border-bottom:1px solid rgba(176,96,48,0.4);}
.reel-filmstrip-inner{display:flex;height:100%;animation:stripScroll 2s linear infinite;}
@keyframes stripScroll{from{transform:translateX(0);}to{transform:translateX(-72px);}}
.reel-frame{flex-shrink:0;width:60px;height:100%;border-left:2px solid #0d0a07;border-right:2px solid #0d0a07;background:linear-gradient(180deg,transparent 0%,transparent 14%,rgba(176,96,48,0.18) 14%,rgba(176,96,48,0.18) 86%,transparent 86%,transparent 100%);position:relative;margin:0 6px;}
.reel-frame::before,.reel-frame::after{content:'';position:absolute;left:50%;width:6px;height:4px;background:#0d0a07;border-radius:1px;transform:translateX(-50%);}
.reel-frame::before{top:1px;}
.reel-frame::after{bottom:1px;}
.loader-title{font-family:'Russo One',sans-serif;font-size:22px;letter-spacing:0.04em;color:var(--bg2);position:relative;z-index:2;text-align:center;}
.loader-title span{color:var(--accent);}
.loader-status{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:rgba(250,249,247,0.6);position:relative;z-index:2;animation:blinkText 1.2s ease-in-out infinite;}
@keyframes blinkText{0%,100%{opacity:0.6;}50%{opacity:1;}}
.loader-counter{position:absolute;bottom:30px;right:30px;font-family:'Russo One',sans-serif;font-size:60px;color:rgba(176,96,48,0.18);letter-spacing:-0.05em;line-height:1;user-select:none;}
.loader-bar{width:200px;height:2px;background:rgba(255,255,255,0.08);position:relative;z-index:2;overflow:hidden;}
.loader-bar-fill{position:absolute;top:0;left:0;height:100%;background:var(--accent);animation:barFill 1.4s ease-out forwards;}
@keyframes barFill{from{width:0%;}to{width:100%;}}

/* ===== USER MENU (in nav) ===== */
.user-badge{display:flex;align-items:center;gap:7px;padding:0 10px;height:30px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);transition:all 0.12s;}
.user-badge:hover{border-color:var(--accent);color:var(--accent);}
.user-badge-avatar{width:20px;height:20px;border-radius:50%;background:var(--accent);color:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:'Russo One',sans-serif;font-size:10px;flex-shrink:0;}
.user-menu{position:absolute;top:46px;right:20px;background:var(--bg2);border:1px solid var(--border2);min-width:180px;box-shadow:0 6px 20px rgba(26,22,16,0.1);z-index:90;display:none;}
.user-menu.open{display:block;}
.user-menu-item{padding:9px 14px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);cursor:pointer;transition:background 0.08s;border-bottom:1px solid var(--border);}
.user-menu-item:hover{background:var(--bg3);color:var(--accent);}
.user-menu-item:last-child{border-bottom:none;}
.user-menu-header{padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);font-family:'Oswald',sans-serif;font-size:10px;color:var(--text);}
.user-menu-header strong{font-weight:600;}
.user-menu-header div{font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}

/* ===== MY FILMOGRAPHY page ===== */
.filmography-head{padding:22px 20px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--bg2),var(--bg3));}
.filmography-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.filmography-title{font-family:'Russo One',sans-serif;font-size:28px;line-height:1.0;color:var(--text);margin-bottom:4px;}
.filmography-sub{font-size:13px;color:var(--text2);font-weight:300;}

/* My Oscars */
.oscars-wrap{padding:18px 20px;border-bottom:1px solid var(--border);background:
  linear-gradient(180deg,rgba(154,120,48,0.08),rgba(154,120,48,0.02));
  position:relative;}
.oscars-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.oscars-title-block{display:flex;align-items:center;gap:10px;}
.oscars-trophy{font-size:24px;filter:drop-shadow(0 1px 1px rgba(154,120,48,0.3));}
.oscars-title{font-family:'Russo One',sans-serif;font-size:18px;color:var(--text);line-height:1;letter-spacing:0.02em;}
.oscars-sub{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-top:2px;}
.oscars-edit-btn{padding:6px 12px;background:var(--bg2);border:1px solid var(--gold);color:var(--gold);font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;cursor:pointer;transition:all 0.12s;}
.oscars-edit-btn:hover{background:var(--gold);color:var(--bg2);}
.oscars-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
.oscar-card{background:var(--bg2);border:1px solid var(--gold);position:relative;padding:14px 12px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all 0.18s;min-height:200px;text-align:center;}
.oscar-card::before{content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;border:1px dashed rgba(154,120,48,0.4);pointer-events:none;}
.oscar-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(154,120,48,0.18);}
.oscar-category{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:600;position:relative;z-index:1;margin-bottom:2px;}
.oscar-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);position:relative;z-index:1;}
.oscar-poster{width:70px;height:105px;object-fit:cover;border:2px solid var(--gold);position:relative;z-index:1;}
.oscar-img-ph,.oscar-poster-ph{background:var(--bg3);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--text3);position:relative;z-index:1;}
.oscar-img-ph{width:80px;height:80px;border-radius:50%;}
.oscar-poster-ph{width:70px;height:105px;}
.oscar-winner{font-family:'Russo One',sans-serif;font-size:13px;color:var(--text);line-height:1.15;position:relative;z-index:1;padding:0 4px;}
.oscar-empty-icon{font-size:32px;color:var(--border2);position:relative;z-index:1;margin-top:8px;}
.oscar-empty-text{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);position:relative;z-index:1;}

/* Oscar picker modal */
.picker-search{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:14px;padding:8px 11px;outline:none;margin-bottom:12px;}
.picker-search:focus{border-color:var(--accent);}
.picker-list{max-height:340px;overflow-y:auto;border-top:1px solid var(--border);}
.picker-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.08s;padding-left:6px;padding-right:6px;}
.picker-row:hover{background:var(--bg3);}
.picker-row img{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.picker-row .picker-poster-thumb{width:34px;height:50px;border-radius:0;}
.picker-row-ph{width:38px;height:38px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.picker-row-name{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--text);}
.picker-row-meta{font-size:10px;color:var(--text3);}
.picker-clear{padding:7px 10px;background:transparent;border:1px solid var(--border);color:var(--text3);font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;margin-top:10px;width:100%;}
.picker-clear:hover{color:var(--red);border-color:var(--red);}

/* Filmography section tabs */
.fg-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);}
.fg-tab{flex:1;padding:10px 0;text-align:center;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all 0.15s;}
.fg-tab.active{color:var(--text);border-bottom:2px solid var(--accent);}
.fg-tab:hover:not(.active){color:var(--text2);}
.fg-tab-count{display:inline-block;background:var(--bg3);color:var(--text3);font-size:9px;padding:1px 5px;margin-left:4px;border-radius:8px;}
.fg-tab.active .fg-tab-count{background:var(--accent);color:var(--bg2);}
.fg-body{padding:18px 20px;}

@media (max-width:740px){
  .hero{grid-template-columns:1fr;}
  .nav-search{width:130px;}
  .compare-grid{grid-template-columns:1fr;}
  .compare-vs{padding:8px 0;}
  .nav-tab{padding:0 10px;font-size:10px;letter-spacing:0.08em;}
  .hero-title{font-size:26px;}
  .oscars-grid{grid-template-columns:repeat(2,1fr);}
  .auth-card{padding:24px 18px;}
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">FILM <span>CLUB</span></div>
    <div class="auth-tagline">Know What To Watch · Win Every Debate</div>

    <div class="auth-offline-banner" id="auth-offline-banner" style="display:none;">
      <strong>Offline mode</strong> — Supabase not configured. Data stays on this device.
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-tab-login" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" id="auth-tab-create" onclick="switchAuthTab('create')">Create Account</button>
      <button class="auth-tab" id="auth-tab-forgot" onclick="switchAuthTab('forgot')">Forgot</button>
    </div>

    <!-- SIGN IN -->
    <div id="auth-form-login">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-input" id="login-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <input class="auth-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="auth-submit" onclick="doLogin()" id="login-submit">Sign In →</button>
      <div class="auth-error" id="auth-error-login"></div>
      <div style="text-align:center;margin-top:10px;">
        <button class="auth-link-btn" onclick="switchAuthTab('forgot')">Forgot password?</button>
      </div>
    </div>

    <!-- CREATE ACCOUNT -->
    <div id="auth-form-create" style="display:none;">
      <div class="auth-field">

<script>
const KEY='17b640203a83e049f68fbdba95b2be09';
const BASE='https://api.themoviedb.org/3';
const IMG='https://image.tmdb.org/t/p/';
const GENRES={28:'Action',35:'Comedy',18:'Drama',27:'Horror',878:'Sci-Fi',53:'Thriller',10749:'Romance',99:'Documentary',80:'Crime',14:'Fantasy',36:'History',10752:'War',16:'Animation',10751:'Family',9648:'Mystery',37:'Western',10402:'Music'};

// ===== AUTH SYSTEM (Supabase or offline fallback) =====
// When Supabase is configured: email/password auth + cloud-synced filmography
// When not configured: localStorage fallback so the app still works

let currentUser=null;        // {id, email, displayName} when logged in
let isOffline=false;          // True if Supabase isn't configured
let sb=null;                  // Supabase client (set when ready)
let syncTimer=null;           // Debounce for cloud writes

// Shared app state — declared early so loadUserDataLocal() can write to them
// even if Supabase module loads before the rest of this script
let currentGenre='';
let currentRankMode='top_rated';
let currentDebateMode='underrated';
let currentFgTab='overview';
let watchlist=[];
let seenList=[];
let myRatings={};
let compareList=[];
let myOscars={};
let filmCache={};
let pickerCategory=null;

function userKey(k){return `fc_${currentUser?.id||'guest'}_${k}`;}

function setOfflineMode(){
  isOffline=true;
  document.getElementById('auth-offline-banner').style.display='';
  document.getElementById('auth-footer').textContent='Add your Supabase credentials at the top of the file to enable sync.';
}

// Bootstrap once Supabase module finishes loading
function initSupabase(){
  if(window.SUPABASE_READY&&window.supabaseClient){
    sb=window.supabaseClient;
    let inRecovery=false;
    // Listen for auth events — includes the PASSWORD_RECOVERY event from email links
    sb.auth.onAuthStateChange((event,session)=>{
      if(event==='PASSWORD_RECOVERY'){
        inRecovery=true;
        showAuthScreen();
        switchAuthTab('reset');
      }
    });
    // Check for an existing session — but defer slightly so the recovery event fires first
    setTimeout(()=>{
      if(inRecovery) return;
      sb.auth.getSession().then(({data})=>{
        if(inRecovery) return;
        if(data.session) handleLoggedIn(data.session.user);
        else showAuthScreen();
      });
    },50);
  } else {
    setOfflineMode();
    // In offline mode, restore last guest session
    const last=localStorage.getItem('fc_guest_session');
    if(last){
      const accts=JSON.parse(localStorage.getItem('fc_offline_accts')||'{}');
      if(accts[last]){
        currentUser={id:last,email:last,displayName:accts[last].name};
        loadUserDataLocal();
        handleLoggedIn();
      } else {
        showAuthScreen();
      }
    } else {
      showAuthScreen();
    }
  }
}

if(window.SUPABASE_READY===undefined){
  window.addEventListener('supabase-ready',initSupabase);
} else {
  initSupabase();
}

function loadUserDataLocal(){
  watchlist=JSON.parse(localStorage.getItem(userKey('wl'))||'[]');
  seenList=JSON.parse(localStorage.getItem(userKey('seen'))||'[]');
  myRatings=JSON.parse(localStorage.getItem(userKey('ratings'))||'{}');
  compareList=JSON.parse(localStorage.getItem(userKey('compare'))||'[]');
  myOscars=JSON.parse(localStorage.getItem(userKey('oscars'))||'{}');
}

async function loadUserDataCloud(){
  if(!sb||!currentUser) return;
  try{
    const {data,error}=await sb.from('user_data').select('*').eq('user_id',currentUser.id).maybeSingle();
    if(error) throw error;
    if(data){
      watchlist=data.watchlist||[];
      seenList=data.seen||[];
      myRatings=data.ratings||{};
      compareList=data.compare||[];
      myOscars=data.oscars||{};
    } else {
      // First-time login — create empty row
      watchlist=[];seenList=[];myRatings={};compareList=[];myOscars={};
      await sb.from('user_data').insert({user_id:currentUser.id,display_name:currentUser.displayName});
    }
    // Also mirror to localStorage so the UI is snappy on reload before sync resolves
    localStorage.setItem(userKey('wl'),JSON.stringify(watchlist));
    localStorage.setItem(userKey('seen'),JSON.stringify(seenList));
    localStorage.setItem(userKey('ratings'),JSON.stringify(myRatings));
    localStorage.setItem(userKey('compare'),JSON.stringify(compareList));
    localStorage.setItem(userKey('oscars'),JSON.stringify(myOscars));
  }catch(e){
    console.error('Cloud load failed, using local cache:',e);
    loadUserDataLocal();
    showSyncIndicator('Sync failed — using local',true);
  }
}

// Debounced cloud write — called after every local mutation
function syncToCloud(){
  if(isOffline||!sb||!currentUser) return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(async()=>{
    try{
      const {error}=await sb.from('user_data').upsert({
        user_id:currentUser.id,
        display_name:currentUser.displayName,
        seen:seenList,
        ratings:myRatings,
        watchlist:watchlist,
        oscars:myOscars,
        compare:compareList,
        updated_at:new Date().toISOString()
      });
      if(error) throw error;
      showSyncIndicator('Synced');
    }catch(e){
      console.error('Sync failed:',e);
      showSyncIndicator('Sync failed',true);
    }
  },800);
}

function showSyncIndicator(text,isError){
  let el=document.getElementById('sync-indicator');
  if(!el){
    el=document.createElement('div');
    el.id='sync-indicator';
    el.className='sync-indicator';
    document.body.appendChild(el);
  }
  el.classList.toggle('error',!!isError);
  el.innerHTML=isError?`<span class="sync-indicator-dot" style="background:#fff;"></span>${text}`:`<span class="sync-indicator-dot"></span>${text}`;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),1400);
}

function switchAuthTab(t){
  const tabs={login:'auth-tab-login',create:'auth-tab-create',forgot:'auth-tab-forgot'};
  const forms={login:'auth-form-login',create:'auth-form-create',forgot:'auth-form-forgot',reset:'auth-form-reset'};
  // Reset visible state
  Object.values(tabs).forEach(id=>document.getElementById(id).classList.remove('active'));
  Object.values(forms).forEach(id=>document.getElementById(id).style.display='none');
  // Hide tab bar entirely during reset flow
  document.querySelector('.auth-tabs').style.display=(t==='reset')?'none':'';
  if(tabs[t]) document.getElementById(tabs[t]).classList.add('active');
  if(forms[t]) document.getElementById(forms[t]).style.display='';
  // Clear errors and info
  ['login','create','forgot','reset'].forEach(k=>{
    const e=document.getElementById('auth-error-'+k);if(e) e.textContent='';
    const i=document.getElementById('auth-info-'+k);if(i){i.style.display='none';i.textContent='';}
  });
}

function showAuthScreen(){
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app-wrap').style.display='none';
}

// ----- SUPABASE-MODE AUTH -----
async function doCreate(){
  const name=document.getElementById('create-name').value.trim();
  const email=document.getElementById('create-email').value.trim();
  const pw=document.getElementById('create-pass').value;
  const pw2=document.getElementById('create-pass2').value;
  const err=document.getElementById('auth-error-create');
  const info=document.getElementById('auth-info-create');
  err.textContent='';info.style.display='none';

  if(!name||name.length<2||name.length>30){err.textContent='Display name must be 2–30 characters';return;}
  if(!email||!email.includes('@')){err.textContent='Enter a valid email';return;}
  if(pw.length<6){err.textContent='Password must be 6+ characters';return;}
  if(pw!==pw2){err.textContent='Passwords do not match';return;}

  if(isOffline){
    // Offline mode: use display name as a local-only identifier
    const accts=JSON.parse(localStorage.getItem('fc_offline_accts')||'{}');
    if(accts[email]){err.textContent='Account already exists locally';return;}
    accts[email]={pw:hashLocal(pw),name,created:Date.now()};
    localStorage.setItem('fc_offline_accts',JSON.stringify(accts));
    currentUser={id:email,email,displayName:name};
    localStorage.setItem('fc_guest_session',email);
    loadUserDataLocal();
    handleLoggedIn();
    return;
  }

  const submitBtn=document.getElementById('create-submit');
  submitBtn.disabled=true;submitBtn.textContent='Creating...';
  try{
    const {data,error}=await sb.auth.signUp({
      email,password:pw,
      options:{data:{display_name:name},emailRedirectTo:window.location.href.split('#')[0]}
    });
    if(error) throw error;
    if(data.user&&!data.session){
      // Email confirmation required
      info.innerHTML='<strong>Check your email.</strong> We sent a confirmation link to <strong>'+email+'</strong>. Click it to activate your account, then sign in.';
      info.style.display='';
    } else if(data.session){
      handleLoggedIn(data.user);
    }
  }catch(e){
    err.textContent=e.message||'Sign up failed';
  }finally{
    submitBtn.disabled=false;submitBtn.textContent='Create Account →';
  }
}

// Local hash for offline fallback only
function hashLocal(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return String(h);}

function showLoader(){
  const screen=document.getElementById('loader-screen');
  screen.classList.remove('hidden');
  const counter=document.getElementById('loader-counter');
  const status=document.getElementById('loader-status');
  const statuses=['Threading Projector...','Loading Print · Reel 1 of 1','Cueing First Frame...','Lights Down.'];
  let n=1;
  counter.textContent=String(n).padStart(2,'0');
  status.textContent=statuses[0];
  const tick=setInterval(()=>{
    n++;
    counter.textContent=String(n).padStart(2,'0');
    if(n===6) status.textContent=statuses[1];
    if(n===12) status.textContent=statuses[2];
    if(n===18) status.textContent=statuses[3];
  },70);
  setTimeout(()=>{
    clearInterval(tick);
    screen.classList.add('hidden');
    document.getElementById('app-wrap').style.display='';
    if(!window._loadedOnce){
      loadDiscover();
      window._loadedOnce=true;
    }
  },1700);
}

async function api(path,params={}){
  const u=new URL(`${BASE}${path}`);
  u.searchParams.set('api_key',KEY);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,String(v)));
  const r=await fetch(u);
  if(!r.ok) throw new Error('API error');
  return r.json();
}

// Bayesian weighted score: WR = (v/(v+m))*R + (m/(v+m))*C
function weightedScore(f){
  const v=f.vote_count||0;
  const R=f.vote_average||0;
  const C=6.8,m=500;
  return (v/(v+m))*R+(m/(v+m))*C;
}

}

async function loadDiscover(){
  try{
    const gp=currentGenre?{with_genres:currentGenre}:{};
    const [tr,cl,gm]=await Promise.all([
      api('/trending/movie/week'),
      api('/movie/top_rated',gp),
      api('/discover/movie',{sort_by:'vote_average.desc','vote_average.gte':7.5,'vote_count.gte':800,'vote_count.lte':15000,...gp})
    ]);
    // Filter by PRIMARY genre — TMDB returns genre_ids in order, first is primary
    const g=parseInt(currentGenre);
    const primaryFilter=arr=>currentGenre?arr.filter(f=>(f.genre_ids||[])[0]===g):arr;
    const secondaryFilter=arr=>currentGenre?arr.filter(f=>(f.genre_ids||[]).includes(g)):arr;

    // For trending: prefer primary, fall back to any-match if too few
    let trending=primaryFilter(tr.results);
    if(currentGenre&&trending.length<6) trending=secondaryFilter(tr.results);

    // For top rated and gems: TMDB's with_genres already includes the genre; tighten to primary
    let classics=primaryFilter(cl.results);
    if(currentGenre&&classics.length<8) classics=cl.results;
    let gems=primaryFilter(gm.results);
    if(currentGenre&&gems.length<8) gems=gm.results;

    document.getElementById('grid-trending').innerHTML=trending.slice(0,12).map(filmCard).join('')||'<div class="no-results">No trending films in this genre this week.</div>';
    document.getElementById('grid-classics').innerHTML=classics.slice(0,12).map(filmCard).join('')||'<div class="no-results">No results</div>';
    document.getElementById('grid-gems').innerHTML=gems.slice(0,12).map(filmCard).join('')||'<div class="no-results">No hidden gems found.</div>';

    document.getElementById('ns-list').innerHTML=trending.slice(0,6).map(nowShowingRow).join('');

    const tickerItems=tr.results.slice(0,15).map(f=>{
      const t=f.title||f.name;
      const s=f.vote_average?f.vote_average.toFixed(1):'—';
      return `<span class="ticker-item">${t}<span class="tk-score">${s}</span></span>`;
    }).join('<span class="tk-sep">·</span>');
    document.getElementById('ticker-track').innerHTML=tickerItems+'<span class="tk-sep">·</span>'+tickerItems;
  }catch(e){
    ['grid-trending','grid-classics','grid-gems'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.innerHTML='<div class="no-results">Add a valid TMDB API key to load films.</div>';
    });
    document.getElementById('ns-list').innerHTML='<div class="no-results">Connection issue.</div>';
  }
}

async function loadCompare(){

    if(!id){
      el.innerHTML=`<div class="compare-empty">
        <div style="font-size:32px;">🎬</div>
        <div>Slot ${i+1} empty</div>
        <button class="compare-empty-btn" onclick="showPage('discover',document.querySelectorAll('.nav-tab')[0])">Browse Films →</button>
      </div>`;
      continue;
    }
    el.innerHTML='<div class="loading-box">Loading</div>';
    try{
      const film=filmCache[id]||await api(`/movie/${id}`);
      filmCache[id]=film;
      const t=film.title||'Untitled';
      const yr=(film.release_date||'').slice(0,4);
      const poster=film.poster_path?`<img class="compare-poster" src="${IMG}w342${film.poster_path}">`:`<div class="compare-poster-ph">🎬</div>`;
      el.innerHTML=`${poster}
        <div class="compare-film-title">${t}</div>
        <div class="compare-film-meta">${yr} · ${film.runtime||'—'} min · ${(film.genres||[]).map(g=>g.name).slice(0,2).join(' · ')}</div>
        <div class="compare-stats" id="cs-${i}"></div>
        <button class="compare-clear" onclick="clearCompareSlot(${i})">Remove</button>`;
    }catch(e){el.innerHTML='<div class="no-results">Couldn\'t load film.</div>';}
  }
  if(compareList[0]&&compareList[1]&&filmCache[compareList[0]]&&filmCache[compareList[1]]){
    const a=filmCache[compareList[0]],b=filmCache[compareList[1]];
    const stats=[
      {lbl:'Score',a:a.vote_average?.toFixed(1)||'—',b:b.vote_average?.toFixed(1)||'—',aNum:a.vote_average||0,bNum:b.vote_average||0,higher:true},
      {lbl:'Votes',a:(a.vote_count||0).toLocaleString(),b:(b.vote_count||0).toLocaleString(),aNum:a.vote_count||0,bNum:b.vote_count||0,higher:true},
      {lbl:'Popularity',a:Math.round(a.popularity||0),b:Math.round(b.popularity||0),aNum:a.popularity||0,bNum:b.popularity||0,higher:true},
      {lbl:'Runtime',a:(a.runtime||0)+' min',b:(b.runtime||0)+' min',aNum:a.runtime||0,bNum:b.runtime||0,higher:null},
      {lbl:'Year',a:(a.release_date||'').slice(0,4)||'—',b:(b.release_date||'').slice(0,4)||'—',aNum:0,bNum:0,higher:null},
      {lbl:'Budget',a:a.budget?'$'+(a.budget/1e6).toFixed(0)+'M':'—',b:b.budget?'$'+(b.budget/1e6).toFixed(0)+'M':'—',aNum:a.budget||0,bNum:b.budget||0,higher:true}
    ];
    const renderStats=(idx)=>stats.map(s=>{
      let isWinner=false;
      if(s.higher===true&&s.aNum!==s.bNum&&s.aNum>0&&s.bNum>0){
        isWinner=(idx===0&&s.aNum>s.bNum)||(idx===1&&s.bNum>s.aNum);
      }
      return `<div class="compare-stat${isWinner?' winner':''}">
        <span class="compare-stat-lbl">${s.lbl}</span>
        <span class="compare-stat-val">${idx===0?s.a:s.b}</span>
      </div>`;
    }).join('');
    document.getElementById('cs-0').innerHTML=renderStats(0);
    document.getElementById('cs-1').innerHTML=renderStats(1);
  }
}

function addToCompare(id){
  if(compareList.includes(id)){toast('Already in compare');return;}
  if(compareList.length>=2) compareList=[compareList[1],id];
  else compareList.push(id);
  localStorage.setItem(userKey('compare'),JSON.stringify(compareList));
  syncToCloud();
  toast(compareList.length===1?'Added — pick one more':'Compare ready');
  if(document.getElementById('page-compare').classList.contains('active')) loadCompare();
}

function clearCompareSlot(i){
  compareList.splice(i,1);
  localStorage.setItem(userKey('compare'),JSON.stringify(compareList));
  syncToCloud();
  loadCompare();
}

        </div>
        <button class="mact-btn btn-compare" onclick="addToCompare(${id});">⚖ Add to Compare</button>
        ${simHtml}
      </div>`;
  }catch(e){content.innerHTML='<div class="loading-box">Failed to load film.</div>';}
}

function rateFilm(id,n){
  if(myRatings[id]===n){delete myRatings[id];n=0;}
  else myRatings[id]=n;
  if(n>0&&!seenList.includes(id)){
    seenList.push(id);
    watchlist=watchlist.filter(x=>x!==id);
    localStorage.setItem(userKey('seen'),JSON.stringify(seenList));
    localStorage.setItem(userKey('wl'),JSON.stringify(watchlist));
  }
  localStorage.setItem(userKey('ratings'),JSON.stringify(myRatings));
  syncToCloud();
  const row=document.getElementById(`stars-${id}`);
  if(row) row.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('lit',i<n));
  toast(n?`Rated ${n}★`:'Rating cleared');
}

function toggleSeen(id){
  const wasSeen=seenList.includes(id);
  if(wasSeen) seenList=seenList.filter(x=>x!==id);
  else{seenList.push(id);watchlist=watchlist.filter(x=>x!==id);}
  localStorage.setItem(userKey('seen'),JSON.stringify(seenList));
  localStorage.setItem(userKey('wl'),JSON.stringify(watchlist));
  syncToCloud();
  toast(wasSeen?'Removed from seen':'Marked as seen');
  openFilm(id);
}

function toggleWL(id){
  const wasWL=watchlist.includes(id);
  if(wasWL) watchlist=watchlist.filter(x=>x!==id);
  else if(!seenList.includes(id)) watchlist.push(id);
  else{toast('Already seen — can\'t add');return;}
  localStorage.setItem(userKey('wl'),JSON.stringify(watchlist));
  syncToCloud();
  toast(wasWL?'Removed from watchlist':'Added to watchlist');
  openFilm(id);
}

async function openPerson(id){
  if(!id) return;
  showPage('people',document.querySelectorAll('.nav-tab')[6]);
  const detail=document.getElementById('person-detail');
  document.getElementById('people-results').style.display='none';
  document.getElementById('people-suggestions').style.display='none';
  detail.style.display='block';
  detail.innerHTML='<div class="loading-box">Loading</div>';
  closeModal();
  try{
    const [p,cr]=await Promise.all([api(`/person/${id}`),api(`/person/${id}/combined_credits`)]);
    const photo=p.profile_path
      ?`<img class="person-photo" src="${IMG}w185${p.profile_path}" alt="">`
      :`<div class="person-photo-ph">👤</div>`;
    const dept=p.known_for_department||'Acting';

    let raw=[];
    if(dept==='Directing') raw=(cr.crew||[]).filter(c=>c.job==='Director');
    else raw=cr.cast||[];

    const seen=new Set();
    const films=raw.filter(f=>{
      if(seen.has(f.id)) return false;
      seen.add(f.id);
      return (f.vote_count||0)>=50 && (f.title||f.name);
    });

    films.sort((a,b)=>weightedScore(b)-weightedScore(a));
    const topFilms=films.slice(0,16);

    const chrono=[...films].filter(f=>f.release_date||f.first_air_date)
      .sort((a,b)=>(a.release_date||a.first_air_date||'').localeCompare(b.release_date||b.first_air_date||''));

    const avg=films.length?(films.reduce((s,f)=>s+(f.vote_average||0),0)/films.length).toFixed(1):'—';
    const best=films.length?films[0]:null;

    let arcSvg='';
    if(chrono.length>=3){
      const W=800,H=120,P=20;
      const xs=chrono.map((f,i)=>P+i*((W-P*2)/Math.max(chrono.length-1,1)));
      const ys=chrono.map(f=>H-P-((f.vote_average||0)/10)*(H-P*2));
      const path=xs.map((x,i)=>`${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
      const dots=xs.map((x,i)=>{
        const f=chrono[i];
        const yr=(f.release_date||f.first_air_date||'').slice(0,4);
        const isHigh=(f.vote_average||0)>=7.5;
        return `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="${isHigh?4:3}" fill="${isHigh?'#b06030':'#8a7e72'}" stroke="#faf9f7" stroke-width="1.5" style="cursor:pointer;" onclick="openFilm(${f.id},'${f.media_type||'movie'}')">
          <title>${(f.title||f.name||'').replace(/"/g,'')} (${yr}) — ${(f.vote_average||0).toFixed(1)}</title></circle>`;
      }).join('');
      const refY=H-P-0.7*(H-P*2);
      arcSvg=`<div class="career-arc">
        <div class="career-arc-title">Career Arc · ${chrono.length} films · Score over time</div>
        <svg class="career-arc-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <line x1="${P}" y1="${refY}" x2="${W-P}" y2="${refY}" stroke="#ddd6cc" stroke-dasharray="3,3"/>
          <text x="${W-P-2}" y="${refY-3}" text-anchor="end" font-family="Oswald" font-size="9" fill="#8a7e72" letter-spacing="0.1em">7.0</text>
          <path d="${path}" fill="none" stroke="#b06030" stroke-width="1.5" opacity="0.6"/>
          ${dots}
        </svg>
      </div>`;
    }

    detail.innerHTML=`
      <div class="person-hero">
        ${photo}
        <div style="min-width:0;flex:1;">
          <div class="person-name">${p.name}</div>
          <div class="person-known">${dept}${p.place_of_birth?' · '+p.place_of_birth:''}</div>
          <div class="person-bio">${(p.biography||'No biography available.').slice(0,320)}${p.biography&&p.biography.length>320?'…':''}</div>
          <div class="person-stats">
            <div class="pstat"><div class="pstat-val">${films.length}</div><div class="pstat-label">Films</div></div>
            <div class="pstat"><div class="pstat-val">${avg}</div><div class="pstat-label">Avg Score</div></div>
            ${best?`<div class="pstat"><div class="pstat-val">${(best.vote_average||0).toFixed(1)}</div><div class="pstat-label">Best</div></div>`:''}
            ${p.birthday?`<div class="pstat"><div class="pstat-val">${new Date().getFullYear()-parseInt(p.birthday.slice(0,4))}</div><div class="pstat-label">Age</div></div>`:''}
          </div>
        </div>
      </div>
      ${arcSvg}
      <div class="section-wrap">
        <div class="section-bar"><span class="section-title"><strong>Filmography</strong> · Ranked by Weighted Score</span></div>
        <div class="film-grid">${topFilms.map(filmCard).join('')}</div>
      </div>`;
  }catch(e){detail.innerHTML='<div class="loading-box">Failed to load.</div>';}
}

              <div class="taste-bar-row">
                <div class="taste-bar-name">${n}</div>
                <div class="taste-bar-bar"><div class="taste-bar-fill" style="width:${(v/maxD*100).toFixed(0)}%;"></div></div>
                <div class="taste-bar-val">${v}</div>
              </div>`).join('')}
          </div>
        </div>`;
    }catch(e){body.innerHTML='<div class="no-results">Couldn\'t build stats.</div>';}
  }
}

function getMyAvgRating(){
  const r=Object.values(myRatings);
  return r.length?(r.reduce((a,b)=>a+b,0)/r.length).toFixed(1):'—';
}

function countOscars(){
  return ['bestFilm','bestDirector','bestActor','bestActress'].filter(k=>myOscars[k]).length;
}

// ===== MY OSCARS =====
const OSCAR_CATEGORIES=[
  {key:'bestFilm',label:'Best Picture',type:'film',emptyIcon:'🎞'},
  {key:'bestDirector',label:'Best Director',type:'director',emptyIcon:'🎬'},
  {key:'bestActor',label:'Best Actor',type:'actor',emptyIcon:'👤'},
  {key:'bestActress',label:'Best Actress',type:'actress',emptyIcon:'👤'}
];

function renderOscars(){
  const grid=document.getElementById('oscars-grid');
  grid.innerHTML=OSCAR_CATEGORIES.map(cat=>{
    const o=myOscars[cat.key];
    if(o){
      let img;
      if(cat.type==='film'){
        img=o.poster_path?`<img class="oscar-poster" src="${IMG}w185${o.poster_path}" alt="">`:`<div class="oscar-poster-ph">🎬</div>`;
      } else {
        img=o.profile_path?`<img class="oscar-img" src="${IMG}w185${o.profile_path}" alt="">`:`<div class="oscar-img-ph">👤</div>`;
      }
      const yr=cat.type==='film'&&o.release_date?` (${o.release_date.slice(0,4)})`:'';
      return `<div class="oscar-card" onclick="openOscarPicker('${cat.key}')">
        <div class="oscar-category">${cat.label}</div>
        ${img}
        <div class="oscar-winner">${o.name||o.title}${yr}</div>
      </div>`;
    } else {
      return `<div class="oscar-card" onclick="openOscarPicker('${cat.key}')" style="border-style:dashed;border-color:var(--border2);">
        <div class="oscar-category">${cat.label}</div>
        <div class="oscar-empty-icon">${cat.emptyIcon}</div>
        <div class="oscar-empty-text">Tap to nominate</div>
      </div>`;
    }
  }).join('');
}

function openOscarPicker(catKey){
  const cat=OSCAR_CATEGORIES.find(c=>c.key===catKey);
  pickerCategory=cat;
  document.getElementById('picker-title').textContent='Pick Your '+cat.label;
  document.getElementById('picker-search').value='';
  document.getElementById('picker-search').placeholder=cat.type==='film'?'Search any film...':'Search any person...';
  document.getElementById('picker-clear-btn').style.display=myOscars[catKey]?'':'none';
  // Show seeded options
  if(cat.type==='film'){
    // Show user's rated films first
    const seeded=Object.entries(myRatings).sort((a,b)=>b[1]-a[1]).map(([id])=>filmCache[id]).filter(Boolean).slice(0,10);
    renderPickerFilms(seeded);
    if(!seeded.length) document.getElementById('picker-list').innerHTML='<div class="no-results" style="padding:14px;">Search to find a film, or rate some first</div>';
  } else {
    document.getElementById('picker-list').innerHTML='<div class="no-results" style="padding:14px;">Start typing to search</div>';
  }
  document.getElementById('picker-modal').classList.add('open');
  setTimeout(()=>document.getElementById('picker-search').focus(),50);
}

function closePicker(){document.getElementById('picker-modal').classList.remove('open');pickerCategory=null;}
function maybeClosePicker(e){if(e.target===document.getElementById('picker-modal')) closePicker();}

let pickerTimer;
function pickerSearch(q){
  clearTimeout(pickerTimer);
  if(!q.trim()){
    if(pickerCategory.type==='film'){
      const seeded=Object.entries(myRatings).sort((a,b)=>b[1]-a[1]).map(([id])=>filmCache[id]).filter(Boolean).slice(0,10);
      renderPickerFilms(seeded);
    } else {
      document.getElementById('picker-list').innerHTML='<div class="no-results" style="padding:14px;">Start typing to search</div>';
    }
    return;
  }
  pickerTimer=setTimeout(async()=>{
    try{
      if(pickerCategory.type==='film'){
        const data=await api('/search/movie',{query:q});
        renderPickerFilms(data.results.slice(0,15));
      } else {
        const data=await api('/search/person',{query:q});
        renderPickerPeople(data.results.slice(0,15));
      }
    }catch(e){}
  },300);
}

function renderPickerFilms(films){
  const list=document.getElementById('picker-list');
  list.innerHTML=films.length?films.map(f=>{
    const t=f.title||f.name||'Untitled';
    const yr=(f.release_date||'').slice(0,4);
    const poster=f.poster_path?`<img class="picker-poster-thumb" src="${IMG}w92${f.poster_path}">`:`<div class="picker-row-ph" style="width:34px;height:50px;border-radius:0;">🎬</div>`;
    return `<div class="picker-row" onclick='setOscar(${JSON.stringify({id:f.id,title:t,poster_path:f.poster_path||null,release_date:f.release_date||""}).replace(/'/g,"&apos;")})'>
      ${poster}
      <div><div class="picker-row-name">${t}</div><div class="picker-row-meta">${yr}${f.vote_average?' · '+f.vote_average.toFixed(1):''}</div></div>
    </div>`;
  }).join(''):'<div class="no-results" style="padding:14px;">No results</div>';
}

function renderPickerPeople(people){
  const list=document.getElementById('picker-list');
  list.innerHTML=people.length?people.map(p=>{
    const img=p.profile_path?`<img src="${IMG}w92${p.profile_path}">`:`<div class="picker-row-ph">👤</div>`;
    const known=(p.known_for||[]).map(f=>f.title||f.name).slice(0,2).join(' · ');
    return `<div class="picker-row" onclick='setOscar(${JSON.stringify({id:p.id,name:p.name,profile_path:p.profile_path||null}).replace(/'/g,"&apos;")})'>
      ${img}
      <div><div class="picker-row-name">${p.name}</div><div class="picker-row-meta">${p.known_for_department||'Actor'}${known?' · '+known:''}</div></div>
    </div>`;
  }).join(''):'<div class="no-results" style="padding:14px;">No results</div>';
}

function setOscar(winner){
  if(!pickerCategory) return;
  myOscars[pickerCategory.key]=winner;
  localStorage.setItem(userKey('oscars'),JSON.stringify(myOscars));
  syncToCloud();
  toast('🏆 '+pickerCategory.label+' awarded');
  closePicker();
  renderOscars();
  renderFgTabContent();
}

function pickerClear(){
  if(!pickerCategory) return;
  delete myOscars[pickerCategory.key];
  localStorage.setItem(userKey('oscars'),JSON.stringify(myOscars));
  syncToCloud();
  toast(pickerCategory.label+' cleared');
  closePicker();
  renderOscars();
  renderFgTabContent();
}

function setGenre(g,btn){
  currentGenre=g;
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['grid-trending','grid-classics','grid-gems'].forEach(id=>document.getElementById(id).innerHTML='<div class="loading-box">Loading</div>');
  loadDiscover();
}

function setRankMode(m,btn){
  currentRankMode=m;
  document.querySelectorAll('.rank-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadRankings();
}

function setDebateMode(m,btn){
  currentDebateMode=m;
  document.querySelectorAll('.debate-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadDebate();
}

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id)?.classList.add('active');
  if(el) el.classList.add('active');
  if(id==='filmography') renderFilmography();
  if(id==='rankings') loadRankings();
  if(id==='debate') loadDebate();
  if(id==='compare') loadCompare();
  if(id==='people'){
    document.getElementById('person-detail').style.display='none';
    document.getElementById('people-results').style.display='none';
    document.getElementById('people-suggestions').style.display='';
    if(!document.getElementById('people-trending').dataset.loaded){
      loadTrendingPeople();
      document.getElementById('people-trending').dataset.loaded='1';
    }
  }
  window.scrollTo(0,0);
}

// ===== BOOT =====
// Startup is handled by initSupabase() at the top of this script, which fires either
// when the Supabase ESM module finishes loading, or immediately if it failed/wasn't
// configured (offline fallback).
</script>
</body>
</html>
